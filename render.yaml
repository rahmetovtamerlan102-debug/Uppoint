services:
  - type: web
    name: uppoint-api
    runtime: image
    repo: https://github.com/rahmetovtamerlan102-debug/Uppoint
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: python app.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: uppoint-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: uppoint-redis
          type: redis
          property: connectionString
      - key: REGION
        value: api
    healthCheckPath: /api/health

  - type: worker
    name: uppoint-worker-us
    runtime: image
    repo: https://github.com/rahmetovtamerlan102-debug/Uppoint
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: python app.py --worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uppoint-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: uppoint-redis
          type: redis
          property: connectionString
      - key: REGION
        value: us-east
    numInstances: 2

  - type: worker
    name: uppoint-worker-eu
    runtime: image
    repo: https://github.com/rahmetovtamerlan102-debug/Uppoint
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: python app.py --worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uppoint-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: uppoint-redis
          type: redis
          property: connectionString
      - key: REGION
        value: eu-west
    numInstances: 2

  - type: worker
    name: uppoint-worker-asia
    runtime: image
    repo: https://github.com/rahmetovtamerlan102-debug/Uppoint
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: python app.py --worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uppoint-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: uppoint-redis
          type: redis
          property: connectionString
      - key: REGION
        value: ap-southeast
    numInstances: 2

  - type: cron
    name: uppoint-scheduler
    runtime: image
    repo: https://github.com/rahmetovtamerlan102-debug/Uppoint
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: python app.py --scheduler
    schedule: "* * * * *"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uppoint-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: uppoint-redis
          type: redis
          property: connectionString

  - type: cron
    name: uppoint-aggregator
    runtime: image
    repo: https://github.com/rahmetovtamerlan102-debug/Uppoint
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: python app.py --aggregator
    schedule: "0 * * * *"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uppoint-db
          property: connectionString

databases:
  - name: uppoint-db
    plan: free

redis:
  - name: uppoint-redis
    plan: free
